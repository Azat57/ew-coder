<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Early Warning Coder</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f5f5;padding:12px;font-size:13px;direction:rtl;}
  h2{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e0e0e0;}
  .code-box{background:#fff;border:2px solid #0078d4;border-radius:6px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .code-text{font-family:'Courier New',monospace;font-size:16px;font-weight:700;color:#0078d4;letter-spacing:1px;word-break:break-all;}
  .copy-btn{background:#0078d4;border:none;border-radius:4px;padding:6px 12px;font-size:12px;cursor:pointer;color:#fff;white-space:nowrap;}
  .copy-btn:hover{background:#106ebe;}
  .apply-btn{width:100%;background:#0078d4;border:none;border-radius:4px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;color:#fff;margin-bottom:14px;}
  .apply-btn:hover{background:#106ebe;}
  .field{margin-bottom:10px;}
  .field label{display:block;font-size:11px;color:#666;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.3px;}
  .field select,.field input{width:100%;border:1px solid #d0d0d0;border-radius:4px;padding:6px 8px;font-size:13px;background:#fff;color:#1a1a1a;}
  .field select:focus,.field input:focus{outline:none;border-color:#0078d4;}
  .attempt-ctrl{display:flex;align-items:center;gap:8px;}
  .attempt-ctrl button{background:#f0f0f0;border:1px solid #d0d0d0;border-radius:4px;width:28px;height:28px;font-size:14px;cursor:pointer;color:#1a1a1a;}
  .attempt-ctrl span{font-size:14px;font-weight:600;min-width:20px;text-align:center;}
  .proj-row{display:flex;gap:6px;}
  .proj-row select{flex:1;}
  .proj-row input{flex:1;}
  .hint{font-size:10px;color:#999;margin-top:3px;}
  .divider{border:none;border-top:1px solid #e0e0e0;margin:12px 0;}
  .log-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .log-title{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;}
  .clear-btn{font-size:11px;color:#666;background:none;border:none;cursor:pointer;}
  .log-list{display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto;}
  .log-item{background:#fff;border:1px solid #e0e0e0;border-radius:4px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;gap:6px;}
  .log-code{font-family:'Courier New',monospace;font-size:11px;font-weight:600;color:#1a1a1a;}
  .log-meta{font-size:10px;color:#999;white-space:nowrap;}
  .log-copy{font-size:10px;color:#0078d4;background:none;border:none;cursor:pointer;}
  .empty-log{font-size:12px;color:#999;text-align:center;padding:12px 0;}
  .struct{font-size:10px;color:#999;text-align:center;margin-bottom:10px;font-family:'Courier New',monospace;letter-spacing:0.5px;}
  .struct span{color:#0078d4;font-weight:700;}
  .success-msg{background:#dff6dd;color:#107c10;border-radius:4px;padding:6px 10px;font-size:12px;text-align:center;margin-bottom:10px;display:none;}
</style>
</head>
<body>

<h2>Early Warning Coder</h2>

<div class="struct">
  <span id="s1">EW</span>-<span id="s2">260312</span>-<span id="s3">PRJ</span>-<span id="s4">01</span>-<span id="s5">VP01</span>
</div>

<div class="code-box">
  <span class="code-text" id="codeOut">EW-260312-PRJ-01-VP01</span>
  <button class="copy-btn" onclick="copyCode()">نسخ</button>
</div>

<div id="successMsg" class="success-msg">تم تطبيق الرمز على موضوع الرسالة</div>

<button class="apply-btn" onclick="applyToSubject()">تطبيق على موضوع الرسالة</button>

<div class="field">
  <label>نوع التقرير</label>
  <select id="prefix" onchange="update()">
    <option value="EW">EW — Early Warning</option>
    <option value="CR">CR — Credit Review</option>
    <option value="AL">AL — Alert</option>
    <option value="UP">UP — Update</option>
  </select>
</div>

<div class="field">
  <label>المشروع</label>
  <div class="proj-row">
    <select id="projSelect" onchange="projSelectChange()">
      <option value="">— محفوظ —</option>
    </select>
    <input type="text" id="projInput" maxlength="8" placeholder="رمز المشروع" oninput="projInputChange()" style="text-transform:uppercase;"/>
  </div>
  <div class="hint">حروف وأرقام — يظهر في الرمز كما هو</div>
</div>

<div class="field">
  <label>المنصب / الدور</label>
  <select id="role" onchange="update()">
    <option value="VP01">VP01 — نائب الرئيس</option>
    <option value="RM01">RM01 — مدير العلاقات</option>
    <option value="CR01">CR01 — مراجع الائتمان</option>
    <option value="GM01">GM01 — المدير العام</option>
    <option value="CUST">CUST — مخصص</option>
  </select>
</div>

<div class="field" id="custField" style="display:none;">
  <label>رمز مخصص (4 أحرف)</label>
  <input type="text" id="custRole" maxlength="4" placeholder="مثال: BD01" oninput="update()" style="text-transform:uppercase;"/>
</div>

<div class="field">
  <label>التاريخ</label>
  <input type="date" id="dateIn" onchange="update()"/>
</div>

<div class="field">
  <label>رقم المحاولة</label>
  <div class="attempt-ctrl">
    <button onclick="changeAttempt(-1)">−</button>
    <span id="attemptOut">1</span>
    <button onclick="changeAttempt(1)">+</button>
  </div>
</div>

<hr class="divider"/>

<div class="log-header">
  <span class="log-title">السجل</span>
  <button class="clear-btn" onclick="clearLog()">مسح</button>
</div>
<div class="log-list" id="logList">
  <div class="empty-log">لا توجد رسائل بعد</div>
</div>

<script>
let attempt = 1;
let log = [];
let savedProjects = [];
let officeReady = false;

Office.onReady(function(info){
  if(info.host === Office.HostType.Outlook){
    officeReady = true;
  }
});

function init(){
  const d = new Date();
  document.getElementById('dateIn').value =
    d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  try{
    const s = localStorage.getItem('ew_projects');
    if(s) savedProjects = JSON.parse(s);
  }catch(e){}
  renderProjSelect();
  update();
}

function renderProjSelect(){
  const sel = document.getElementById('projSelect');
  sel.innerHTML = '<option value="">— محفوظ —</option>';
  savedProjects.forEach(p=>{
    const o = document.createElement('option');
    o.value = p; o.textContent = p; sel.appendChild(o);
  });
}

function projSelectChange(){
  const v = document.getElementById('projSelect').value;
  if(v) document.getElementById('projInput').value = v;
  update();
}

function projInputChange(){
  const el = document.getElementById('projInput');
  el.value = el.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
  document.getElementById('projSelect').value = '';
  update();
}

function getProj(){
  return document.getElementById('projInput').value || 'PRJ';
}

function getDateCode(){
  const v = document.getElementById('dateIn').value;
  if(!v) return '';
  const p = v.split('-');
  return p[0].slice(2)+p[1]+p[2];
}

function getRoleVal(){
  const r = document.getElementById('role').value;
  if(r==='CUST'){
    return (document.getElementById('custRole').value||'CUST').toUpperCase().padEnd(4,'X').slice(0,4);
  }
  return r;
}

function update(){
  document.getElementById('custField').style.display =
    document.getElementById('role').value==='CUST' ? 'block' : 'none';
  const prefix = document.getElementById('prefix').value;
  const dateCode = getDateCode();
  const proj = getProj();
  const att = String(attempt).padStart(2,'0');
  const role = getRoleVal();
  const code = prefix+'-'+dateCode+'-'+proj+'-'+att+'-'+role;
  document.getElementById('codeOut').textContent = code;
  document.getElementById('s1').textContent = prefix;
  document.getElementById('s2').textContent = dateCode;
  document.getElementById('s3').textContent = proj;
  document.getElementById('s4').textContent = att;
  document.getElementById('s5').textContent = role;
}

function changeAttempt(d){
  attempt = Math.max(1, Math.min(99, attempt+d));
  document.getElementById('attemptOut').textContent = attempt;
  update();
}

function copyCode(){
  const code = document.getElementById('codeOut').textContent;
  navigator.clipboard.writeText(code).catch(()=>{});
  const btn = document.querySelector('.copy-btn');
  btn.textContent = 'تم ✓';
  setTimeout(()=>{ btn.textContent='نسخ'; }, 1500);
}

function applyToSubject(){
  const code = document.getElementById('codeOut').textContent;
  if(officeReady){
    Office.context.mailbox.item.subject.setAsync(code, function(result){
      if(result.status === Office.AsyncResultStatus.Succeeded){
        showSuccess();
        logEntry(code);
      }
    });
  } else {
    navigator.clipboard.writeText(code).catch(()=>{});
    showSuccess();
    logEntry(code);
  }
}

function showSuccess(){
  const msg = document.getElementById('successMsg');
  msg.style.display = 'block';
  setTimeout(()=>{ msg.style.display='none'; }, 2500);
}

function logEntry(code){
  const proj = getProj();
  if(proj !== 'PRJ' && !savedProjects.includes(proj)){
    savedProjects.push(proj);
    try{ localStorage.setItem('ew_projects', JSON.stringify(savedProjects)); }catch(e){}
    renderProjSelect();
  }
  const now = new Date();
  const time = now.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
  log.unshift({code, time, proj});
  attempt++;
  document.getElementById('attemptOut').textContent = attempt;
  update();
  renderLog();
}

function renderLog(){
  const el = document.getElementById('logList');
  if(!log.length){ el.innerHTML='<div class="empty-log">لا توجد رسائل بعد</div>'; return; }
  el.innerHTML = log.map((item,i)=>`
    <div class="log-item">
      <span class="log-code">${item.code}</span>
      <span class="log-meta">${item.proj} · ${item.time}</span>
      <button class="log-copy" onclick="copyItem(${i})">نسخ</button>
    </div>`).join('');
}

function copyItem(i){
  navigator.clipboard.writeText(log[i].code).catch(()=>{});
}

function clearLog(){ log=[]; renderLog(); }

init();
</script>
</body>
</html>
